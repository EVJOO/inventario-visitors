<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#F6EB3C">
<title>인벤타리오 2026 문구페어 · 부스 가이드</title>
<meta name="description" content="인벤타리오 2026 문구페어 방문객용 부스 가이드 — 찜·방문 체크·메모·스탬프 랠리">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  @font-face{
    font-family:'KkuBulLim';
    src:url('https://cdn.jsdelivr.net/gh/projectnoonnu/2410-1@1.0/BMkkubulimTTF-Regular.woff2') format('woff2');
    font-weight:normal;font-display:swap;
  }
  :root{
    --display:"KkuBulLim","Black Han Sans",system-ui,sans-serif;
    --ink:#1C2230;
    --ink-2:#465268;
    --ink-3:#8995A8;
    --paper:#FBFDFF;
    --panel:#FFFFFF;
    --bg:#F4F6FA;
    --page:#FFFFF0; /* 메인 페이지 배경 아이보리 */
    --hair:rgba(28,34,48,.08);

    --pink:#FC59DE; --pink-deep:#E034C2;
    --cyan:#0EB9EB; --cyan-soft:#E6F7FE;
    --green:#50F253; --green-soft:#E8FBE9;
    --yellow:#F6EB3C; --yellow-soft:#FEFAD6;

    /* 원본 PDF 추출 카테고리 색 */
    --c-small:#F4B4C4;     --c-small-s:#FDEDF1;
    --c-workshop:#DCC400;  --c-workshop-s:#FAF3D0;
    --c-writing:#80DCF4;   --c-writing-s:#E6F8FD;
    --c-daily:#388824;     --c-daily-s:#DBEBD2;
    --c-paper:#00B8F0;     --c-paper-s:#D6F1FB;
    --c-office:#4A4A4A;    --c-office-s:#E5E5E5;
    --c-kiosk:#4CF448;     --c-kiosk-s:#DEFADD;
    --c-common:#8995A8;    --c-common-s:#E8ECF2;

    --radius-lg:24px; --radius-md:18px; --radius-sm:12px;
    --shadow-card:0 8px 24px rgba(28,34,48,.06), 0 1px 0 rgba(28,34,48,.04);
    --shadow-soft:0 2px 10px rgba(28,34,48,.04);
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;}
  html,body{font-family:"Pretendard",system-ui,sans-serif;color:var(--ink);}
  body{
    background:var(--page);
    min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}

  /* ===== 앱 컨테이너 ===== */
  .app{
    max-width:520px;margin:0 auto;
    padding:14px 14px 32px;
    padding-top:calc(14px + env(safe-area-inset-top));
  }

  /* ===== 메타 카드 (옐로우) ===== */
  .meta-card{
    background:#F6EB3C;
    border-radius:14px;
    padding:10px 14px;
    color:var(--ink);
    margin-bottom:12px;
    box-shadow:0 4px 14px rgba(246,235,60,.35);
    display:flex;align-items:center;justify-content:space-between;gap:10px;
  }
  .meta-body{min-width:0;flex:1;}
  .meta-title{
    font-family:var(--display);
    font-size:17px;font-weight:400;line-height:1.05;letter-spacing:-.3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  }
  .meta-info{font-size:10.5px;font-weight:700;opacity:.75;margin-top:2px;letter-spacing:.2px;}
  .meta-end{display:flex;align-items:center;gap:6px;flex:0 0 auto;}
  .save-dot{
    display:inline-flex;align-items:center;gap:5px;
    background:rgba(28,34,48,.13);border-radius:999px;
    padding:4px 9px;font-size:10px;font-weight:700;
  }
  .save-dot::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--green);}
  .save-dot.session::before{background:#F39C12;}

  /* ===== 진행 카드 (핑크) ===== */
  .progress-card{
    background:linear-gradient(140deg, var(--pink) 0%, var(--pink-deep) 100%);
    border-radius:var(--radius-lg);
    padding:20px 20px 18px;
    color:var(--ink);
    margin-bottom:16px;
    box-shadow:0 10px 24px rgba(252,89,222,.32);
    position:relative;overflow:hidden;
  }
  .progress-eyebrow{
    display:inline-block;
    background:rgba(28,34,48,.13);border-radius:999px;
    padding:4px 10px;font-size:10px;font-weight:700;letter-spacing:.5px;
  }
  .progress-row{display:flex;align-items:flex-end;justify-content:space-between;margin-top:8px;gap:14px;}
  .progress-num{
    font-family:var(--display);
    font-size:64px;font-weight:400;line-height:.9;letter-spacing:-2px;
  }
  .progress-num small{
    font-family:var(--display);
    font-size:20px;opacity:.6;letter-spacing:0;
  }
  .progress-label{font-size:12px;font-weight:600;line-height:1.4;text-align:right;}
  .progress-label b{display:block;font-size:13px;font-weight:700;margin-bottom:2px;}
  .bar{
    margin-top:14px;height:10px;background:rgba(255,255,255,.4);
    border-radius:999px;overflow:hidden;
  }
  .bar > div{height:100%;background:var(--ink);border-radius:999px;transition:width .35s;}
  .progress-foot{
    display:flex;justify-content:space-between;
    margin-top:10px;font-size:11px;font-weight:600;opacity:.7;
  }
  .progress-deco{
    position:absolute;right:-30px;bottom:-30px;width:140px;height:140px;
    background:rgba(255,255,255,.12);border-radius:50%;
  }

  /* ===== 홀 배치도 ===== */
  .hall-card{
    background:var(--panel);border-radius:20px;
    box-shadow:var(--shadow-card);
    overflow:hidden;margin-bottom:14px;
  }
  .hall-head{
    display:flex;justify-content:space-between;align-items:center;
    padding:14px 16px 10px;
  }
  .hall-title{
    font-family:var(--display);
    font-size:22px;font-weight:400;line-height:1;letter-spacing:-.3px;
  }
  .hall-title small{
    font-family:"Pretendard";font-size:10px;font-weight:700;
    color:var(--ink-3);letter-spacing:.8px;display:block;margin-bottom:4px;
  }
  .hall-zoom{
    background:var(--ink);color:#fff;border:0;border-radius:999px;
    padding:7px 13px;font-size:11px;font-weight:700;
    display:inline-flex;align-items:center;gap:4px;
  }
  .hall-scroll{overflow-x:auto;background:#F4F7FB;padding:10px 0;-webkit-overflow-scrolling:touch;}
  .hall-scroll img{display:block;width:780px;max-width:none;transition:width .25s;}
  .hall-scroll.zoomed img{width:1300px;}
  .hall-foot{
    padding:10px 16px 14px;color:var(--ink-3);font-size:11px;font-weight:500;
    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .hall-foot .num{
    background:var(--bg);padding:3px 8px;border-radius:999px;
    font-weight:700;color:var(--ink-2);font-size:10.5px;
  }

  /* ===== 부스 인덱스 ===== */
  .booth-index{
    background:var(--panel);border-radius:20px;
    box-shadow:var(--shadow-card);
    overflow:hidden;
  }
  .index-head{padding:16px 16px 0;}
  .index-title{
    font-family:var(--display);
    font-size:20px;font-weight:400;letter-spacing:-.2px;
  }
  .index-sub{font-size:11px;color:var(--ink-3);margin-top:2px;font-weight:500;}

  /* 검색 */
  .idx-search{
    display:flex;align-items:center;gap:10px;
    background:var(--bg);border-radius:12px;
    padding:11px 14px;margin:12px 0 10px;
  }
  .idx-search input{
    flex:1;border:0;outline:0;background:transparent;
    font-size:13.5px;color:var(--ink);font-weight:500;
  }
  .idx-search input::placeholder{color:var(--ink-3);font-weight:500;}
  .idx-search svg{width:16px;height:16px;color:var(--ink-3);flex:0 0 16px;}
  .idx-clear{
    background:transparent;border:0;padding:2px 4px;color:var(--ink-3);
    font-size:14px;display:none;
  }
  .idx-clear.show{display:block;}

  /* 필터 칩 */
  .idx-chips{
    display:flex;gap:6px;overflow-x:auto;padding:0 0 10px;margin:0 -16px;padding-left:16px;padding-right:16px;
    scrollbar-width:none;
  }
  .idx-chips::-webkit-scrollbar{display:none;}
  .idx-chip{
    flex:0 0 auto;
    background:var(--bg);border-radius:999px;border:0;
    padding:7px 12px;font-size:11.5px;font-weight:700;color:var(--ink-2);
    white-space:nowrap;
  }
  .idx-chip.active{background:var(--ink);color:#fff;}
  .idx-chip.fav.active{background:var(--yellow);color:var(--ink);}

  /* 정렬 탭 */
  .idx-tabs{
    background:var(--bg);border-radius:12px;padding:4px;
    display:flex;margin-bottom:12px;
  }
  .idx-tab{
    flex:1;background:transparent;border:0;
    padding:8px 10px;border-radius:9px;
    font-size:12px;font-weight:700;color:var(--ink-3);
    text-align:center;
  }
  .idx-tab.active{background:#fff;color:var(--ink);box-shadow:var(--shadow-soft);}

  .idx-body{padding:0 16px 18px;}
  .idx-count{padding:0 0 8px;font-size:11px;color:var(--ink-3);font-weight:600;}
  .idx-count b{color:var(--ink);font-weight:800;}

  /* 그룹 헤더 (알파벳) */
  .alpha-group{margin-top:14px;}
  .alpha-group:first-child{margin-top:4px;}
  .alpha-letter{
    font-family:var(--display);font-size:18px;font-weight:400;
    padding-bottom:6px;border-bottom:1px solid var(--hair);margin-bottom:8px;
    display:flex;align-items:baseline;gap:8px;
  }
  .alpha-letter small{font-family:"Pretendard";font-size:11px;font-weight:600;color:var(--ink-3);}

  /* 카테고리 그룹 */
  .cat-group{margin-top:16px;}
  .cat-group:first-child{margin-top:4px;}
  .cat-head{
    display:flex;align-items:center;gap:8px;margin-bottom:8px;
    padding-bottom:6px;border-bottom:1px solid var(--hair);
  }
  .cat-chip{
    display:inline-flex;align-items:center;gap:6px;
    padding:5px 10px;border-radius:999px;
    font-size:11px;font-weight:800;
  }
  .cat-chip .dot{width:8px;height:8px;border-radius:50%;}
  .cat-count{font-size:11px;color:var(--ink-3);font-weight:600;margin-left:auto;}

  /* 인덱스 행 */
  .idx-rows{display:flex;flex-direction:column;gap:6px;}
  .idx-row{
    display:flex;align-items:center;gap:10px;
    padding:12px 12px;
    background:#fff;border-radius:12px;
    box-shadow:0 1px 4px rgba(28,34,48,.04);
    cursor:pointer;border:0;width:100%;text-align:left;
    color:inherit;font-family:inherit;
    transition:transform .08s, box-shadow .08s;
  }
  .idx-row:hover{box-shadow:0 4px 12px rgba(28,34,48,.08);}
  .idx-row:active{transform:scale(.99);}
  .idx-row .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px;}
  .idx-row .code-block{
    display:flex;flex-direction:column;align-items:flex-start;min-width:54px;
  }
  .idx-row .code{font-weight:800;color:var(--ink);font-size:12px;letter-spacing:.3px;}
  .idx-row .hall{
    font-size:9.5px;font-weight:800;letter-spacing:.3px;
    padding:1px 6px;border-radius:4px;margin-top:3px;
  }
  .idx-row .hall.p1{background:var(--yellow-soft);color:#7A6A0D;}
  .idx-row .hall.p2{background:var(--cyan-soft);color:#0A85AC;}
  .idx-row .hall.lounge{background:var(--c-common-s);color:#5B4DB0;}
  .idx-row .name-block{flex:1;min-width:0;}
  .idx-row .name{
    font-weight:700;color:var(--ink);font-size:13.5px;line-height:1.25;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .idx-row .name-en{
    font-size:10.5px;color:var(--ink-3);font-weight:500;margin-top:1px;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .idx-row .actions{display:flex;gap:4px;flex:0 0 auto;}

  /* 토글 */
  .idx-toggle{
    width:32px;height:32px;border-radius:9px;border:0;
    background:var(--bg);
    display:grid;place-items:center;
    transition:all .1s;
  }
  .idx-toggle.on-fav{background:var(--yellow);}
  .idx-toggle.on-vis{background:var(--green);}
  .idx-toggle.on-memo{background:var(--cyan);}

  /* 이모지 토글 */
  .idx-toggle .em{
    font-size:17px;line-height:1;
    filter:grayscale(1) opacity(.32);
    transition:filter .15s;
  }
  .idx-toggle.on-fav .em,
  .idx-toggle.on-vis .em,
  .idx-toggle.on-memo .em{filter:none;}

  /* 빈 상태 */
  .empty{
    text-align:center;padding:40px 20px;color:var(--ink-3);
  }
  .empty .em{font-size:36px;margin-bottom:8px;}
  .empty .title{font-family:var(--display);font-size:20px;color:var(--ink);margin-bottom:4px;}
  .empty .sub{font-size:12px;}

  /* 푸터 액션 */
  .footer-actions{
    margin-top:18px;text-align:center;
  }
  .reset-btn{
    background:var(--panel);border:0;border-radius:12px;
    box-shadow:var(--shadow-soft);
    padding:11px 22px;font-weight:700;font-size:12.5px;color:#C13030;
  }

  /* ===== 바텀시트 (상세) ===== */
  .scrim{
    position:fixed;inset:0;background:rgba(28,34,48,.55);
    z-index:50;opacity:0;pointer-events:none;
    transition:opacity .2s;
  }
  .scrim.show{opacity:1;pointer-events:auto;}

  .sheet{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--page);
    border-top-left-radius:28px;border-top-right-radius:28px;
    padding:10px 20px calc(28px + env(safe-area-inset-bottom));
    z-index:51;
    transform:translateY(100%);
    transition:transform .25s cubic-bezier(.2,.8,.2,1);
    max-width:520px;margin:0 auto;
    max-height:88vh;overflow-y:auto;
    box-shadow:0 -8px 24px rgba(28,34,48,.18);
  }
  .sheet.show{transform:translateY(0);}
  .grip{
    width:42px;height:5px;background:rgba(28,34,48,.15);border-radius:99px;
    margin:0 auto 14px;
  }
  .sheet-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
  .sheet-code{
    background:var(--ink);color:#fff;
    font-weight:800;font-size:11px;letter-spacing:.5px;
    padding:4px 9px;border-radius:8px;
  }
  .sheet-cat-chip{
    display:inline-flex;align-items:center;gap:6px;
    background:#fff;border-radius:999px;
    padding:5px 11px;font-size:11px;font-weight:700;
  }
  .sheet-cat-chip .dot{width:8px;height:8px;border-radius:50%;}
  .sheet-hall{
    font-size:10px;font-weight:800;letter-spacing:.3px;
    padding:3px 8px;border-radius:5px;
  }
  .sheet-hall.p1{background:var(--yellow-soft);color:#7A6A0D;}
  .sheet-hall.p2{background:var(--cyan-soft);color:#0A85AC;}
  .sheet-hall.lounge{background:var(--c-common-s);color:#5B4DB0;}
  .sheet-ko{
    font-family:var(--display);
    font-size:32px;font-weight:400;line-height:1.05;margin-top:12px;letter-spacing:-.5px;
  }
  .sheet-en{font-size:13px;color:var(--ink-2);margin-top:3px;font-weight:500;}

  .sheet-actions{
    display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:18px;
  }
  .big-toggle{
    background:var(--panel);border:0;border-radius:16px;
    box-shadow:var(--shadow-soft);
    padding:16px 12px;text-align:left;font-weight:700;font-size:13px;
    display:flex;flex-direction:column;gap:8px;
  }
  .big-toggle .ico{
    width:34px;height:34px;border-radius:12px;
    background:var(--bg);display:grid;place-items:center;color:var(--ink-3);
  }
  .big-toggle .label{font-size:13px;font-weight:700;}
  .big-toggle .sub{font-size:11px;color:var(--ink-3);font-weight:500;}
  .big-toggle.on-fav{background:var(--yellow);}
  .big-toggle.on-fav .ico{background:rgba(28,34,48,.15);color:var(--ink);}
  .big-toggle.on-fav .sub{color:rgba(28,34,48,.6);}
  .big-toggle.on-vis{background:var(--green);}
  .big-toggle.on-vis .ico{background:rgba(28,34,48,.15);color:var(--ink);}
  .big-toggle.on-vis .sub{color:rgba(28,34,48,.6);}

  .big-toggle .em{
    font-size:24px;line-height:1;
    filter:grayscale(1) opacity(.4);
  }
  .big-toggle.on-fav .em,
  .big-toggle.on-vis .em{filter:none;}

  .memo-label{
    margin-top:18px;font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.3px;
    display:flex;align-items:center;gap:6px;
  }
  .memo-label .memo-status{color:var(--cyan);font-weight:800;display:none;}
  .memo-label.has-memo .memo-status{display:inline;}
  .memo{
    margin-top:8px;width:100%;min-height:90px;
    background:var(--panel);border:0;border-radius:14px;
    box-shadow:var(--shadow-soft);
    padding:12px 14px;font-size:13px;color:var(--ink);font-weight:500;
    resize:vertical;outline:0;line-height:1.5;
  }
  .memo:focus{box-shadow:0 0 0 3px var(--cyan),0 2px 10px rgba(28,34,48,.04);}

  /* 키보드 포커스 */
  button:focus-visible,
  input:focus-visible,
  textarea:focus-visible{outline:3px solid var(--cyan);outline-offset:2px;}

  /* 모션 감소 */
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{
      animation-duration:.01ms!important;
      animation-iteration-count:1!important;
      transition-duration:.01ms!important;
    }
  }
</style>
</head>
<body>

<div class="app">

  <!-- 메타 카드 -->
  <div class="meta-card">
    <div class="meta-body">
      <div class="meta-title">인벤타리오 2026 문구페어</div>
      <div class="meta-info">COEX THE PLATZ · 06.10 — 14</div>
    </div>
    <div class="meta-end">
      <span class="save-dot" id="saveDot" title="브라우저에 저장됨">저장됨</span>
    </div>
  </div>

  <!-- 방문 진행 카드 -->
  <div class="progress-card">
    <div class="progress-deco"></div>
    <div class="progress-eyebrow">방문 진행</div>
    <div class="progress-row">
      <div class="progress-num"><span id="progNum">0</span><small> / 115</small></div>
      <div class="progress-label">
        <b>전체 부스 중</b><span id="progPct">0</span>% 완료
      </div>
    </div>
    <div class="bar"><div id="progBar" style="width:0%;"></div></div>
    <div class="progress-foot">
      <span>⭐ 찜 <span id="progFav">0</span>곳</span>
      <span>남은 부스 <span id="progLeft">115</span>곳</span>
    </div>
  </div>

  <!-- PLATZ HALL 1 -->
  <div class="hall-card">
    <div class="hall-head">
      <div class="hall-title"><small>FLOOR MAP</small>PLATZ HALL 1</div>
      <button class="hall-zoom" data-hall="hall1">⤢ 확대</button>
    </div>
    <div class="hall-scroll" data-hall="hall1">
      <img src="hall1.png" alt="PLATZ HALL 1 부스 배치도" loading="lazy">
    </div>
    <div class="hall-foot">
      <span>← 좌우로 밀어서 보기</span>
      <span class="num">E·F·G·H·I·J·K·L 구역</span>
    </div>
  </div>

  <!-- PLATZ HALL 2 -->
  <div class="hall-card">
    <div class="hall-head">
      <div class="hall-title"><small>FLOOR MAP</small>PLATZ HALL 2</div>
      <button class="hall-zoom" data-hall="hall2">⤢ 확대</button>
    </div>
    <div class="hall-scroll" data-hall="hall2">
      <img src="hall2.png" alt="PLATZ HALL 2 부스 배치도" loading="lazy">
    </div>
    <div class="hall-foot">
      <span>← 좌우로 밀어서 보기</span>
      <span class="num">A·B·C·D 구역 + LOUNGE</span>
    </div>
  </div>

  <!-- 부스 인덱스 -->
  <div class="booth-index">

// 2. 저장 로직
// =========================
const store = (()=>{
  const KEY="inventario2026_state"; let ok=false, mem={};
  try{localStorage.setItem("__t","1");localStorage.removeItem("__t");ok=true;}catch(e){}
  return {
    ok,
    load(){ if(ok){try{return JSON.parse(localStorage.getItem(KEY)||"{}");}catch(e){return{};}} return mem; },
    save(o){ if(ok){try{localStorage.setItem(KEY,JSON.stringify(o));return;}catch(e){}} mem=o; }
  };
})();
let state = store.load();
function st(id){ return state[id] || (state[id]={planned:false,visited:false,memo:""}); }
function persist(){ store.save(state); }

// =========================
// 3. 헬퍼
// =========================
function hallOf(code){
  const c = (code||"").trim();
  if (!c) return 'lounge';
  if (c[0] === 'M') return 'lounge';
  if ('ABCD'.includes(c[0])) return 'p2';
  return 'p1'; // E~L
}
function hallLabel(h){
  return h==='p1'?'P1':(h==='p2'?'P2':'L');
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function normalize(s){
  return String(s||'').toLowerCase().trim();
}

// =========================
// 4. 뷰 상태
// =========================
const view = {
  search: '',
  filter: 'all',       // all | planned | unvisited | memo
  sort: 'alpha',       // alpha | cat
  openBoothId: null
};

// =========================
// 5. 필터링
// =========================
function visibleBooths(){
  const q = normalize(view.search);
  return BOOTHS.filter(b => {
    if (q){
      const hay = (b.code+' '+b.nameKo+' '+b.nameEn).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    const s = st(b.id);
    if (view.filter === 'planned' && !s.planned) return false;
    if (view.filter === 'unvisited' && s.visited) return false;
    if (view.filter === 'memo' && !s.memo.trim()) return false;
    return true;
  });
}

// =========================
// 6. 인덱스 렌더
// =========================
function rowHtml(b){
  const s = st(b.id);
  const cat = CATS[b.category];
  const hall = hallOf(b.code);
  const onFav = s.planned ? 'on-fav' : '';
  const onVis = s.visited ? 'on-vis' : '';
  const onMemo = s.memo.trim() ? 'on-memo' : '';
  return `
    <button class="idx-row" data-id="${esc(b.id)}">
      <span class="dot" style="background:${cat.color}"></span>
      <div class="code-block">
        <span class="code">${esc(b.code)}</span>
        <span class="hall ${hall}">${hallLabel(hall)}</span>
      </div>
      <div class="name-block">
        <div class="name">${esc(b.nameKo)}</div>
        <div class="name-en">${esc(b.nameEn)}</div>
      </div>
      <div class="actions">
        <span class="idx-toggle ${onFav}" data-act="fav"><span class="em">⭐️</span></span>
        <span class="idx-toggle ${onVis}" data-act="vis"><span class="em">✅</span></span>
        <span class="idx-toggle ${onMemo}" data-act="memo"><span class="em">📝</span></span>
      </div>
    </button>`;
}

function renderIndex(){
  const list = visibleBooths();
  const body = document.getElementById('indexBody');

  if (list.length === 0){
    body.innerHTML = `
      <div class="empty">
        <div class="em">${view.search ? '🔍' : '✨'}</div>
        <div class="title">${view.search ? '검색 결과가 없어요' : '조건에 맞는 부스가 없어요'}</div>
        <div class="sub">검색어를 바꾸거나 필터를 해제해보세요</div>
      </div>`;
    return;
  }

  let html = `<div class="idx-count"><b>${list.length}</b>개 표시 · 전체 115개 중</div>`;

  if (view.sort === 'alpha'){
    // 알파벳순 그룹
    const groups = {};
    list.forEach(b => {
      const letter = b.code[0];
      if (!groups[letter]) groups[letter] = [];
      groups[letter].push(b);
    });
    const letters = Object.keys(groups).sort();
    letters.forEach(letter => {
      const items = groups[letter].sort((a,b)=> a.code.localeCompare(b.code));
      const hallsUsed = [...new Set(items.map(b => hallOf(b.code)))];
      let hallDesc = '';
      if (hallsUsed.length === 1){
        const h = hallsUsed[0];
        hallDesc = h==='p1' ? '모두 PLATZ 1' : h==='p2' ? '모두 PLATZ 2' : 'LOUNGE';
      }
      html += `
        <div class="alpha-group">
          <div class="alpha-letter">${esc(letter)} <small>${items.length}개${hallDesc ? ' · '+hallDesc : ''}</small></div>
          <div class="idx-rows">${items.map(rowHtml).join('')}</div>
        </div>`;
    });
  } else {
    // 카테고리별
    CAT_ORDER.forEach(catKey => {
      const items = list.filter(b => b.category === catKey)
                        .sort((a,b)=> a.code.localeCompare(b.code));
      if (items.length === 0) return;
      const cat = CATS[catKey];
      html += `
        <div class="cat-group">
          <div class="cat-head">
            <span class="cat-chip" style="background:${cat.soft};color:${cat.color}">
              <span class="dot" style="background:${cat.color}"></span>${esc(cat.ko)}
            </span>
            <span class="cat-count">${items.length}개</span>
          </div>
          <div class="idx-rows">${items.map(rowHtml).join('')}</div>
        </div>`;
    });
  }
  body.innerHTML = html;
}

// =========================
// 7. 진행 카드 + 칩 카운트 업데이트
// =========================
function updateProgress(){
  let visited=0, planned=0, memo=0;
  BOOTHS.forEach(b => {
    const s = st(b.id);
    if (s.visited) visited++;
    if (s.planned) planned++;
    if (s.memo.trim()) memo++;
  });
  const total = BOOTHS.length;
  const pct = total ? Math.round(visited/total*100) : 0;

  document.getElementById('progNum').textContent = visited;
  document.getElementById('progPct').textContent = pct;
  document.getElementById('progBar').style.width = pct + '%';
  document.getElementById('progFav').textContent = planned;
  document.getElementById('progLeft').textContent = total - visited;

  // 칩 카운트
  const chips = document.querySelectorAll('[data-count]');
  const counts = {
    all: total,
    planned: planned,
    unvisited: total - visited,
    memo: memo
  };
  chips.forEach(el => {
    const k = el.dataset.count;
    if (k in counts) el.textContent = counts[k];
  });
}

// =========================
// 8. 토글 핸들러
// =========================
function toggle(id, act){
  const s = st(id);
  if (act === 'fav') s.planned = !s.planned;
  if (act === 'vis') s.visited = !s.visited;
  if (act === 'memo'){
    // 메모 토글은 클릭만으론 안 됨 — 상세 모달로 유도
    openSheet(id);
    return;
  }
  persist();
  updateProgress();
  // 현재 보이는 필터에서 사라질 수 있으면 다시 렌더
  if (view.filter !== 'all') {
    renderIndex();
  } else {
    // 행만 빠르게 업데이트
    updateRow(id);
  }
  if (view.openBoothId === id) syncSheet();
}

function updateRow(id){
  const row = document.querySelector(`.idx-row[data-id="${CSS.escape(id)}"]`);
  if (!row) return;
  const s = st(id);
  const favEl = row.querySelector('[data-act="fav"]');
  const visEl = row.querySelector('[data-act="vis"]');
  const memoEl = row.querySelector('[data-act="memo"]');
  favEl.classList.toggle('on-fav', s.planned);
  visEl.classList.toggle('on-vis', s.visited);
  memoEl.classList.toggle('on-memo', !!s.memo.trim());
}

// =========================
// 9. 상세 모달 (바텀시트)
// =========================
let lastFocus = null;

function openSheet(id){
  const b = BOOTHS.find(x => x.id === id);
  if (!b) return;
  view.openBoothId = id;
  lastFocus = document.activeElement;
  syncSheet();
  document.getElementById('scrim').classList.add('show');
  document.getElementById('sheet').classList.add('show');
  document.body.style.overflow = 'hidden';
  // 첫 포커스
  setTimeout(()=> document.getElementById('memoInput').focus({preventScroll:true}), 80);
}

function closeSheet(){
  view.openBoothId = null;
  document.getElementById('scrim').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
  document.body.style.overflow = '';
  if (lastFocus) lastFocus.focus();
}

function syncSheet(){
  const id = view.openBoothId;
  if (!id) return;
  const b = BOOTHS.find(x => x.id === id);
  if (!b) return;
  const s = st(b.id);
  const cat = CATS[b.category];
  const hall = hallOf(b.code);

  // 상단 칩
  document.getElementById('sheetTop').innerHTML = `
    <span class="sheet-code">${esc(b.code)}</span>
    <span class="sheet-cat-chip"><span class="dot" style="background:${cat.color}"></span>${esc(cat.ko)}</span>
    <span class="sheet-hall ${hall}">${hallLabel(hall) === 'L' ? 'LOUNGE' : 'PLATZ '+hallLabel(hall).slice(1)}</span>
  `;
  document.getElementById('sheetTitle').textContent = b.nameKo;
  document.getElementById('sheetEn').textContent = b.nameEn;

  // 큰 토글
  const favBtn = document.getElementById('bigFav');
  const visBtn = document.getElementById('bigVis');
  favBtn.classList.toggle('on-fav', s.planned);
  visBtn.classList.toggle('on-vis', s.visited);
  favBtn.setAttribute('aria-pressed', s.planned);
  visBtn.setAttribute('aria-pressed', s.visited);
  document.getElementById('bigFavLabel').textContent = s.planned ? '찜한 부스' : '찜하기';
  document.getElementById('bigFavSub').textContent = s.planned ? '탭해서 해제' : '탭해서 찜';
  document.getElementById('bigVisLabel').textContent = s.visited ? '방문 완료' : '방문 전';
  document.getElementById('bigVisSub').textContent = s.visited ? '탭해서 해제' : '탭해서 방문 체크';

  // 메모
  const memoInput = document.getElementById('memoInput');
  if (document.activeElement !== memoInput) memoInput.value = s.memo;
  document.getElementById('memoLabel').classList.toggle('has-memo', !!s.memo.trim());
}

// =========================
// 10. 이벤트 바인딩
// =========================
function bind(){
  // 검색
  const searchInput = document.getElementById('searchInput');
  const searchClear = document.getElementById('searchClear');
  searchInput.addEventListener('input', e => {
    view.search = e.target.value;
    searchClear.classList.toggle('show', !!view.search);
    renderIndex();
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    view.search = '';
    searchClear.classList.remove('show');
    renderIndex();
    searchInput.focus();
  });

  // 필터 칩
  document.getElementById('filterChips').addEventListener('click', e => {
    const btn = e.target.closest('.idx-chip');
    if (!btn) return;
    const f = btn.dataset.filter;
    view.filter = f;
    document.querySelectorAll('#filterChips .idx-chip').forEach(c =>
      c.classList.toggle('active', c.dataset.filter === f));
    renderIndex();
  });

  // 정렬 탭
  document.getElementById('sortTabs').addEventListener('click', e => {
    const btn = e.target.closest('.idx-tab');
    if (!btn) return;
    const s = btn.dataset.sort;
    view.sort = s;
    document.querySelectorAll('#sortTabs .idx-tab').forEach(t =>
      t.classList.toggle('active', t.dataset.sort === s));
    renderIndex();
  });

  // 인덱스 본문: 토글 또는 행 클릭 (이벤트 위임)
  document.getElementById('indexBody').addEventListener('click', e => {
    const togEl = e.target.closest('[data-act]');
    const rowEl = e.target.closest('.idx-row');
    if (!rowEl) return;
    const id = rowEl.dataset.id;
    if (togEl){
      e.preventDefault();
      e.stopPropagation();
      const act = togEl.dataset.act;
      toggle(id, act);
      return;
    }
    openSheet(id);
  });

  // 홀 확대 토글
  document.querySelectorAll('.hall-zoom').forEach(btn => {
    btn.addEventListener('click', () => {
      const target = btn.dataset.hall;
      const scroll = document.querySelector(`.hall-scroll[data-hall="${target}"]`);
      const zoomed = scroll.classList.toggle('zoomed');
      btn.textContent = zoomed ? '⤡ 축소' : '⤢ 확대';
    });
  });

  // 시트 토글들
  document.getElementById('bigFav').addEventListener('click', () => {
    if (!view.openBoothId) return;
    const s = st(view.openBoothId);
    s.planned = !s.planned;
    persist();
    syncSheet();
    updateProgress();
    if (view.filter === 'planned') renderIndex();
    else updateRow(view.openBoothId);
  });
  document.getElementById('bigVis').addEventListener('click', () => {
    if (!view.openBoothId) return;
    const s = st(view.openBoothId);
    s.visited = !s.visited;
    persist();
    syncSheet();
    updateProgress();
    if (view.filter === 'unvisited') renderIndex();
    else updateRow(view.openBoothId);
  });

  // 메모 입력
  document.getElementById('memoInput').addEventListener('input', e => {
    if (!view.openBoothId) return;
    const s = st(view.openBoothId);
    s.memo = e.target.value;
    persist();
    document.getElementById('memoLabel').classList.toggle('has-memo', !!s.memo.trim());
    updateProgress();
    if (view.filter === 'memo') renderIndex();
    else updateRow(view.openBoothId);
  });

  // 시트 닫기 — 스크림, ESC
  document.getElementById('scrim').addEventListener('click', closeSheet);
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && view.openBoothId) closeSheet();
  });

  // 그립 또는 시트 상단 영역 클릭 시 닫기 (탭해서 닫기 옵션)
  document.querySelector('.grip').addEventListener('click', closeSheet);

  // 초기화
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('찜·방문·메모 기록을 모두 지울까요? 되돌릴 수 없습니다.')) return;
    state = {};
    persist();
    renderIndex();
    updateProgress();
  });
}

// =========================
// 11. 초기화
// =========================
function init(){
  if (!store.ok){
    const dot = document.getElementById('saveDot');
    dot.classList.add('session');
    dot.textContent = '세션만';
    dot.title = '브라우저 저장 불가 — 새로고침 시 초기화됩니다';
  }
  bind();
  renderIndex();
  updateProgress();
}

document.addEventListener('DOMContentLoaded', init);
</script>
